<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Heart Disease Prediction</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">Heart Disease Prediction Using ML</h2>

    <form method="POST" action="/predict">

        <div class="row g-3">

            <div class="col-md-4">
                <label>Age</label>
                <input type="number" name="age" class="form-control" required>
            </div>

            <div class="col-md-4">
                <label>Sex</label>
                <input type="number" name="sex" class="form-control" min="0" max="1" required>
            </div>

            <div class="col-md-4">
                <label>Chest Pain Type (0-3)</label>
                <input type="number" name="cp" class="form-control" min="0" max="3" required>
            </div>

            <div class="col-md-4">
                <label>Resting Blood Pressure</label>
                <input type="number" name="trestbps" class="form-control" required>
            </div>

            <div class="col-md-4">
                <label>Cholesterol</label>
                <input type="number" name="chol" class="form-control" required>
            </div>

            <div class="col-md-4">
                <label>Fasting Blood Sugar > 120 mg/dl (1=True, 0=False)</label>
                <input type="number" name="fbs" class="form-control" min="0" max="1" required>
            </div>

            <div class="col-md-4">
                <label>Resting ECG (0-2)</label>
                <input type="number" name="restecg" class="form-control" min="0" max="2" required>
            </div>

            <div class="col-md-4">
                <label>Maximum Heart Rate Achieved</label>
                <input type="number" name="thalach" class="form-control" required>
            </div>

            <div class="col-md-4">
                <label>Exercise Induced Angina (1 = Yes, 0 = No)</label>
                <input type="number" name="exang" class="form-control" min="0" max="1" required>
            </div>

            <div class="col-md-4">
                <label>Oldpeak (ST depression)</label>
                <input type="number" step="any" name="oldpeak" class="form-control" required>
            </div>

            <div class="col-md-4">
                <label>Slope (0-2)</label>
                <input type="number" name="slope" class="form-control" min="0" max="2" required>
            </div>

            <div class="col-md-4">
                <label>Number of Major Vessels (0-3)</label>
                <input type="number" name="ca" class="form-control" min="0" max="3" required>
            </div>

            <div class="col-md-4">
                <label>Thal (1 = Normal, 2 = Fixed Defect, 3 = Reversible Defect)</label>
                <input type="number" name="thal" class="form-control" min="1" max="3" required>
            </div>

        </div>

        <div class="text-center mt-4">
            <button type="submit" class="btn btn-primary">Predict</button>
        </div>

    </form>

</div>

</body>
</html>
